<!DOCTYPE html>
<!-- Define que o documento é HTML5 -->

<html lang="pt">
<head>
    <meta charset="UTF-8">
    <!-- Permite usar acentos -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz a página se adaptar a celulares -->

    <title>Area de Login</title>

    <link rel="stylesheet" href="Logincss.css">
    <!-- Linkamento do CSS -->


</head>

<body>
<div class="card">
<form>
<!-- Formulário que irá enviar os dados de login -->

    <h2>Entrar com Usuário</h2>
   

<label for="email">Email:</label>    
<input type="email" id="email" name="email" placeholder="Digite seu Email"required>
<!-- Campo de email obrigatório -->



<label for="password">Senha:</label>
<input type="password" id="password" name="password" placeholder="Digite sua senha" required>
<!-- Campo de senha (oculta os caracteres) -->




<p class="cadastro"> Ainda não tem conta? <a href="../CADASTRO/cadastro.html">Cadastre-se</a></p>



<input id="entrar" type="submit" value="Entrar">
<!-- Botão que envia o formulário -->

</form>
</div>

</body>
</html>
