<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    
    <link rel="stylesheet" href="cadastro.css">
</head>






<body>
   <div class="card">

    <a class="voltar" href="../LOGIN/Login.html"> Voltar para login</a>


<form>


    <h2>Cadastre-se</h2>

        <div class="campo">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="campo">
            <label for="sobrenome">Sobrenome</label>
            <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome" required>
        </div>

        <div class="campo">
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" maxlength="11" required> 
        </div>

        <div class="campo">
            <label for="email"> Email:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu Email" required>
        </div>
        
        <div class="campo">
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Digite a Senha" minlength="6" required>
        </div>
        
        <div class="campo">
            <label for="confirmar_senha">Confirmar Senha:</label>
            <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Confirme a Senha" minlength="6" required>
        </div>



<br>
        <input id="cadastrar" type="submit" value="Cadastrar">









</form>


</div> 




</body>
</html>
